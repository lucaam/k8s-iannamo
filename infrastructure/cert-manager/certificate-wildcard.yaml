apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-apps
  namespace: traefik
  labels:
    app.kubernetes.io/name: cert-manager
spec:
  secretName: wildcard-apps-tls
  issuerRef:
    name: cloudflare
    kind: ClusterIssuer
  dnsNames:
  - "*.${DOMAIN}"
  - "*.home.${DOMAIN}"
