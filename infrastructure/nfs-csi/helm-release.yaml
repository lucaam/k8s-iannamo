apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: csi-driver-nfs
      version: 4.12.0
      sourceRef:
        kind: HelmRepository
        name: csi-driver-nfs
        namespace: flux-system
  values:
    kubeletDir: /var/lib/kubelet
    controller:
      replicaCount: 2
    node:
      tolerations:
        - operator: "Exists"
    # NON creare StorageClass nel chart, lo faremo noi
    storageClass:
      create: false