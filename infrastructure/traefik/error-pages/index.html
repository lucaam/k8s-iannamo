<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            line-height: 1;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Lost in the void</h1>
        <p>The page you're looking for doesn't exist here.</p>
        <div class="actions">
            <a href="#" class="btn-primary" onclick="goHome()">Go home</a>
        </div>
    </div>
</body>


<script>
    function goHome() {
        const hostname = window.location.hostname;

        // Early return if already on auth subdomain to avoid self-redirect
        if (hostname.startsWith('auth.')) {
            window.location.href = window.location.origin + '/';
            return;
        }

        // Check for IP addresses (IPv4 or IPv6)
        const ipv4Pattern = /^(\d{1,3}\.){3}\d{1,3}$/;
        const ipv6Pattern = /^([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}$/;

        if (ipv4Pattern.test(hostname) || ipv6Pattern.test(hostname)) {
            // IP address detected, use auth subdomain with the IP
            window.location.href = 'https://auth.' + hostname;
            return;
        }

        const parts = hostname.split('.');

        // Single-label hostname (e.g., "localhost") - fallback to current origin
        if (parts.length === 1) {
            window.location.href = window.location.origin + '/';
            return;
        }

        // Extract registrable domain (last two labels for most TLDs)
        // For proper public suffix support, consider using a library in production
        const baseDomain = parts.slice(-2).join('.');

        // If baseDomain equals hostname, we're already at the apex domain
        if (baseDomain === hostname) {
            window.location.href = 'https://auth.' + hostname;
            return;
        }

        // Build redirect URL with auth subdomain
        window.location.href = 'https://auth.' + baseDomain;
    }
</script>

</html>
