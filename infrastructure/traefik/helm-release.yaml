apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
  labels:
    app.kubernetes.io/name: traefik
spec:
  interval: 10m
  chart:
    spec:
      chart: traefik
      version: 37.3.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  install:
    crds: Skip
  values:

    logs:
      general:
        level: WARN

    access:
      enabled: true

    crds:
      enabled: false

    deployment:
      replicas: 2

    providers:
      kubernetesGateway:
        enabled: true
      kubernetesIngress:
        enabled: false
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true

    ports:
      web:
        port: 8000
        exposedPort: 80
        redirections:
          entryPoint:
            to: websecure
            scheme: https
      websecure:
        port: 8443
        exposedPort: 443
        tls:
          enabled: true
        transport:
          # NOTE: Extended timeouts (600s) are intentional to support
          # long-lived connections (websockets/large uploads). If you do
          # not require such use-cases, consider reducing these values
          # to safer defaults (readTimeout: 60s, idleTimeout: 180s).
          respondingTimeouts:
            readTimeout: 600s
            idleTimeout: 600s
            writeTimeout: 600s
        middlewares:
          - traefik-traefik-errors@kubernetescrd   # gestisce 500/503 su tutte le route

    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.${DOMAIN}`)
        entryPoints: ["websecure"]
        middlewares:
          - name: authentik-forward-auth
          - name: traefik-errors

    gateway:
      namespacePolicy: All

    service:
      annotations:
        metallb.io/ip-allocated-from-pool: external-pool
        metallb.io/allow-shared-ip: external-pool
        metallb.io/loadBalancerIPs: 192.168.178.10

    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi
