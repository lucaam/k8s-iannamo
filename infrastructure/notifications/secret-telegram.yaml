# Il token viene sostituito da Flux postBuild.substituteFrom
# (secret "telegram-credentials" in flux-system).
# NON serve cifrare questo file con SOPS.
---
apiVersion: v1
kind: Secret
metadata:
  name: telegram-bot
  namespace: flux-system
  labels:
    app.kubernetes.io/name: notifications
type: Opaque
stringData:
  token: "${TELEGRAM_BOT_TOKEN}"
