apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: flux-operator
  chartRef:
    kind: OCIRepository
    name: flux-operator-chart
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  values:
    installCRDs: true
    multitenancy:
      enabled: false
      defaultServiceAccount: flux-operator
    serviceAccount:
      create: true
      name: flux-operator
