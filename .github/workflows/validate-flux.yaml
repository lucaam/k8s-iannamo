name: Validate Flux Manifests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  KUBERNETES_VERSION: "1.31.0"
  KUSTOMIZE_VERSION: "5.6.0"
  KUBECONFORM_VERSION: "0.6.7"

jobs:
  validate-kustomize:
    name: Kustomize Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - infrastructure
          - apps
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Kustomize
        uses: fluxcd/pkg/actions/kustomize@2b9f4c54119931dd929e1f47b88ef8ae118fa6c0 # was @main

      - name: Build ${{ matrix.path }}
        run: |
          # Build kustomize overlays — substitution vars are placeholders
          kustomize build ./${{ matrix.path }} > /dev/null
          echo "✅ kustomize build ${{ matrix.path }} succeeded"

  validate-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: YAML Lint (changed files only)
        run: |
          set -euo pipefail
          # Bring origin history so we can diff against base branch
          git fetch origin --no-tags --prune --depth=1 || true

          # Prefer PR base if available (set in job env), otherwise fall back to origin/main
          echo "Base ref: $BASE_REF"
          git fetch origin "$BASE_REF" --depth=1 || true

          # Compute changed files relative to base (NUL-separated for safety)
          mapfile -d '' -t CHANGED_FILES < <(git diff --name-only -z "origin/$BASE_REF"...HEAD || true)
          if [ ${#CHANGED_FILES[@]} -eq 0 ]; then
            echo "No files changed in this PR — skipping yamllint"
            exit 0
          fi

          # Filter YAML files (preserve filenames with spaces)
          YAML_FILES=()
          for f in "${CHANGED_FILES[@]}"; do
            if [[ "$f" =~ \.ya?ml$ ]]; then
              YAML_FILES+=("$f")
            fi
          done
          if [ ${#YAML_FILES[@]} -eq 0 ]; then
            echo "No YAML files changed in this PR — skipping yamllint"
            exit 0
          fi

          # Write yamllint config
          cat > /tmp/ci-yamllint.yaml << 'YAML'
          extends: default
          ignore: |
            clusters/production/flux-system/
            *.sops.yaml
            .sops.yaml
          rules:
            line-length: disable
            document-start: disable
            comments:
              min-spaces-from-content: 1
            truthy:
              check-keys: false
            key-duplicates: enable
          YAML

          # Run yamllint on changed YAML files (safe for spaces)
          yamllint -c /tmp/ci-yamllint.yaml "${YAML_FILES[@]}" || exit 1

  validate-kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    needs: validate-kustomize
    strategy:
      matrix:
        path:
          - infrastructure
          - apps
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Kustomize
        uses: fluxcd/pkg/actions/kustomize@2b9f4c54119931dd929e1f47b88ef8ae118fa6c0 # was @main

      - name: Setup kubeconform
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | \
            tar xz -C /usr/local/bin kubeconform
          curl -sL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o /usr/local/bin/yq && \
            chmod +x /usr/local/bin/yq

      - name: Validate ${{ matrix.path }}
        run: |
          kustomize build ./${{ matrix.path }} | \
            yq eval 'select(.sops == null)' - | \
            kubeconform \
              -strict \
              -ignore-missing-schemas \
              -skip HTTPRoute \
              -kubernetes-version "${KUBERNETES_VERSION}" \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -summary
          echo "✅ kubeconform ${{ matrix.path }} passed"

  validate-flux:
    name: Flux Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@bc924b03a648dfd96866b0e52003f22dae3f46cf # main

      - name: Validate Flux custom resources
        run: |
          echo "Validating Flux Kustomization CRs..."
          find . -name '*.yaml' -path '*/clusters/*' | while read -r file; do
            echo "  checking: $file"
            flux check --pre 2>/dev/null || true
          done

          echo "Validating HelmRelease CRs..."
          find . -name 'helm-release.yaml' | while read -r file; do
            echo "  checking: $file"
            kubectl apply --dry-run=client -f "$file" 2>/dev/null || \
              echo "  ⚠️ $file may have issues (CRD not available in CI)"
          done

          echo "✅ Flux CR validation complete"
