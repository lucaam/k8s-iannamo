name: Validate Crosscutting Manifests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  crosscutting-manifest-checks:
    name: Crosscutting Manifest Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run crosscutting manifest tests
        run: |
          # Use pytest plugin option to disable warnings in a supported way
          pytest tests/test_pr_manifests.py --maxfail=1 -p no:warnings -v
