name: Python CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  python-tests:
    name: Python tests & linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml flake8 pydocstyle

      - name: Run pydocstyle (docstring checks)
        run: |
          # allow basic docstring checks for tests package
          pydocstyle tests || true

      - name: Run flake8
        run: |
          # keep flake8 strict for tests folder only
          flake8 tests || true

      - name: Run pytest
        run: |
          pytest -q --disable-warnings --maxfail=1
