apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
  labels:
    app.kubernetes.io/name: jellyfin
spec:
  interval: 1h
  chart:
    spec:
      chart: ./charts/jellyfin
      sourceRef:
        kind: GitRepository
        name: media-servarr
        namespace: flux-system
  targetNamespace: jellyfin
  values:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      config:
        enabled: true
        existingClaim: jellyfin-config
      media:
        enabled: true
        existingClaim: jellyfin-media
    # transcode/cache: consider emptyDir for performance, or create a small fast PVC
