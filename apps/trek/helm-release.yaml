apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
  namespace: trek
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: ./charts/trek
      sourceRef:
        kind: GitRepository
        name: trek
        namespace: flux-system

  values:
    image:
      repository: mauriceboe/trek
      tag: 3.2.1
      pullPolicy: Always

    resources:
      requests:
        cpu: "15m"
        memory: "320Mi"
      limits:
        cpu: "50m"
        memory: "768Mi"

    service:
      type: ClusterIP
      port: 3000

    env:
      NODE_ENV: production
      PORT: 3000
      ALLOWED_ORIGINS: "https://trek.${DOMAIN}"
      APP_URL: "https://trek.${DOMAIN}"
      FORCE_HTTPS: "true"
      TRUST_PROXY: "1"
      MCP_RATE_LIMIT: "300"
      MCP_MAX_SESSION_PER_USER: "20"
      OIDC_ISSUER: "https://auth.${DOMAIN}"
      OIDC_ADMIN_CLAIM: "trip admins"
      OIDC_DISCOVERY_URL: "https://auth.${DOMAIN}/application/o/trek/.well-known/openid-configuration"
      # OIDC_CLIENT_SECRET NON va qui: va nel Secret referenziato da existingSecret sotto

    existingSecret: trek-secret
    existingSecretKey: JWT_SECRET   # vedi nota sotto

    persistence:
      enabled: true
      data:
        existingClaim: trek-data
      uploads:
        existingClaim: trek-uploads
