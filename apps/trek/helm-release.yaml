apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
  namespace: trek
spec:
  interval: 5m
  timeout: 15m
  chart:
    spec:
      chart: ./charts/trek
      sourceRef:
        kind: GitRepository
        name: trek
        namespace: flux-system
  values:
    image:
      repository: mauriceboe/trek
      tag: 3.0.21
      pullPolicy: Always

    service:
      type: ClusterIP
      port: 3000

    env:
      NODE_ENV: production
      PORT: 3000
      ALLOWED_ORIGINS: "https://trek.${DOMAIN}"
      APP_URL: "https://trek.${DOMAIN}"
      FORCE_HTTPS: "true"
      TRUST_PROXY: "1"
      # MCP Configuration
      MCP_RATE_LIMIT: "300"
      MCP_MAX_SESSION_PER_USER: "20"
      # OIDC/OAuth2 Configuration
      OIDC_ADMIN_CLAIM: "trip admins"
      # Add these when you have Authentik configured:
      # OIDC_ISSUER: "https://auth.${DOMAIN}"
      # OIDC_CLIENT_ID: "trek"
      # OIDC_DISCOVERY_URL: "https://auth.${DOMAIN}/application/o/.well-known/openid-configuration"
      # OIDC_SCOPE: "openid email profile groups"

    existingSecret: trek-secret
    existingSecretKey: JWT_SECRET

    persistence:
      # PVCs are managed by Kustomize (pvc.yaml) with ReadWriteMany.
      # The chart's pvc.yaml template is broken (hardcodes RWO, ignores
      # existingClaim/accessMode). Disable to stop chart from creating PVCs.
      # The deployment template still mounts trek-data and trek-uploads.
      enabled: false
