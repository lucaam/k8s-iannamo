apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gatus
  namespace: gatus
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gatus
  namespaceSelector:
    any: false
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
