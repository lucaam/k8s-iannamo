apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
spec:
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: "2026.2.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  interval: 1h
  targetNamespace: authentik
  values:
    postgresql:
      enabled: true
      primary:
        persistence:
          storageClass: nfs-flash
      auth:
        existingSecret: authentik-secrets
    server:
      enabled: true
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          parentRefs:
            - name: traefik-gateway
              namespace: traefik
      resources:
        limits: {}
        requests: {}
    worker:
      enabled: true
      resources:
        limits: {}
        requests: {}
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secrets
              key: secret-key
