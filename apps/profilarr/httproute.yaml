apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: profilarr-httproute
  namespace: profilarr
  labels:
    app.kubernetes.io/name: profilarr
spec:
  hostnames:
  - "profilarr.${DOMAIN}"
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
    sectionName: websecure
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: profilarr
      port: 6868
