apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: profilarr
  namespace: profilarr
  labels:
    app.kubernetes.io/name: profilarr
spec:
  interval: 1h
  chart:
    spec:
      chart: "profilarr"
      version: "0.1.2"
      sourceRef:
        kind: HelmRepository
        name: charliecharts
        namespace: flux-system
  targetNamespace: profilarr
  values:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
