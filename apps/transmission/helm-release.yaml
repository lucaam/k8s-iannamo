apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: transmission
  namespace: transmission
  labels:
    app.kubernetes.io/name: transmission
spec:
  interval: 1h
  chart:
    spec:
      chart: ./charts/transmission
      sourceRef:
        kind: GitRepository
        name: media-servarr
        namespace: flux-system
  targetNamespace: transmission
  values:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
    persistence:
      config:
        enabled: true
        existingClaim: transmission-storage
      downloads:
        enabled: true
        existingClaim: transmission-storage
