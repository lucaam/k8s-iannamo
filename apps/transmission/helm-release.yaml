apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: transmission
  namespace: transmission
  labels:
    app.kubernetes.io/name: transmission
spec:
  interval: 1h
  chart:
    spec:
      chart: ./charts/transmission
      sourceRef:
        kind: GitRepository
        name: media-servarr
        namespace: flux-system
  targetNamespace: media
  values:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      config:
        enabled: true
        existingClaim: transmission-config
      downloads:
        enabled: true
        existingClaim: media-shared
