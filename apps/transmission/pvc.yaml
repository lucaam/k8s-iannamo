apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: transmission-storage
  namespace: transmission
  labels:
    app.kubernetes.io/name: transmission-storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 200Gi
  storageClassName: nfs-spacex
# Downloads/media should use `nfs-spacex`; adjust size as needed for your library.
