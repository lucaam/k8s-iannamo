apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: social-media-reuploader
  namespace: social-media-reuploader
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: ./charts/social-media-reuploader
      sourceRef:
        kind: GitRepository
        name: social-media-reuploader
        namespace: flux-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    replicaCount: 1
    serviceAccount:
      create: true
      name: ""
    image:
      repository: ghcr.io/lucaam/social-media-reuploader
      tag: latest
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 80
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    secret:
      create: false
      name: social-media-reuploader-secret
      botTokenKey: BOT_TOKEN
    env:
      BOT_TOKEN: null
      MODE: webhook
      WEBHOOK_URL: null
      TMP_DIR: /tmp/telegram_downloader
      TELEGRAM_MAX_FILE_SIZE: 52428800
      WORKERS: 2
    gui:
      enabled: true
      useSecret: true
      secretName: social-media-reuploader-gui-secret
      env: {}
      image:
        repository: ghcr.io/lucaam/social-media-reuploader
        tag: latest
        pullPolicy: IfNotPresent
      port: 8081
    db:
      pvc:
        enabled: false
