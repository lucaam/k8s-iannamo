apiVersion: v1
kind: Secret
metadata:
  name: aurral-secrets
  namespace: aurral
  labels:
    app.kubernetes.io/name: aurral-secrets
type: Opaque
stringData:
  # Secrets for Aurral - replace with real values and encrypt with sops
  # Common / recommended (uncomment and fill as needed):
  admin_password: ""          # initial admin password (used for onboarding/reset)
  LASTFM_API_KEY: ""          # Last.fm API key (recommended for discovery)
  LIDARR_API_KEY: ""          # Lidarr API key (optional; usually configured via UI)
  NAVIDROME_USERNAME: ""      # Navidrome integration username (optional)
  NAVIDROME_PASSWORD: ""      # Navidrome integration password (optional)
  TICKETMASTER_API_KEY: ""    # Ticketmaster API key (optional)

  # Optional / less commonly pre-seeded - comment out if unused
  # SOULSEEK_USERNAME: ""
  # SOULSEEK_PASSWORD: ""
  # SLSKD_API_KEY: ""          # slskd API key (if using slskd)
  # GOTIFY_TOKEN: ""           # Gotify token for notifications
  # GENERIC_API_KEY: ""        # legacy placeholder - prefer specific keys above
sops:
  version: "3.11.0"
