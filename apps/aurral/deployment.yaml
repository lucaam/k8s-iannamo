apiVersion: apps/v1
kind: Deployment
metadata:
  name: aurral
  namespace: aurral
  labels:
    app: aurral
    app.kubernetes.io/name: aurral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aurral
      app.kubernetes.io/name: aurral
  template:
    metadata:
      labels:
        app: aurral
        app.kubernetes.io/name: aurral
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: aurral
        image: ghcr.io/lklynet/aurral:1.76.3
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: PORT
          value: "3001"
        - name: TRUST_PROXY
          value: "1"
        - name: DOWNLOAD_FOLDER
          value: "/app/downloads"
        - name: PUID
          value: "1001"
        - name: PGID
          value: "1001"
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aurral-secrets
              key: admin_password
        - name: APP_DOCS_URL
          value: "https://github.com/lklynet/aurral"
        volumeMounts:
        - name: aurral-config
          mountPath: /app/config
        - name: aurral-media
          mountPath: /app/downloads
        - name: aurral-storage
          mountPath: /app/backend/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: config-data
        persistentVolumeClaim:
          claimName: aurral-config
      - name: media-data
        persistentVolumeClaim:
          claimName: media-shared
