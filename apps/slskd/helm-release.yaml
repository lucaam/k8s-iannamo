apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slskd
  namespace: slskd
  labels:
    app.kubernetes.io/name: slskd
spec:
  interval: 1h
  chart:
    spec:
      chart: "slskd"
      version: "0.3.0"
      sourceRef:
        kind: HelmRepository
        name: alexmorbo-slskd
        namespace: flux-system
  targetNamespace: media
  values:
    podSecurityContext:
      fsGroup: 1000
    securityContext:
      runAsUser: 1000
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      existingClaim: media-shared
