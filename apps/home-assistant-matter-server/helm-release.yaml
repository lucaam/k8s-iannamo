apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant-matter-server
  namespace: home-assistant-matter-server
spec:
  interval: 15m
  chart:
    spec:
      chart: home-assistant-matter-server
      version: "4.1.16"
      sourceRef:
        kind: HelmRepository
        name: wittdennis
        namespace: flux-system
  values:
    image:
      repository: matter-js/matterjs-server
      pullPolicy: IfNotPresent
      tag: "0.6.8"

    log:
      logLevel: info
      logLevelSDK: progress

    bluetoothCommissioning:
      enabled: false

    service:
      type: LoadBalancer
      port: 5580
      annotations:
        metallb.io/ip-allocated-from-pool: external-pool
        metallb.io/allow-shared-ip: external-pool
        metallb.io/loadBalancerIPs: 192.168.178.14

# Enable hostNetwork and hostPort for Matter Server requirements
    hostNetwork: true
    hostPort: true

    # Use an existing PVC for data (avoid chart-created PVCs/volumeClaimTemplates)
    persistence:
      enabled: true
      existingClaim: home-assistant-matter-server-data

    podSecurityContext:
      fsGroup: 1000
      runAsNonRoot: false
      runAsUser: 0

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false

    resources:
      requests:
        cpu: "13m"
        memory: "160Mi"
      limits:
        cpu: "50m"
        memory: "288Mi"

    livenessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3

    readinessProbe:
      httpGet:
        path: /
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

    nodeSelector: {}

    tolerations: []

    affinity: {}
