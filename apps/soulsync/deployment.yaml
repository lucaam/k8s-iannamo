apiVersion: apps/v1
kind: Deployment
metadata:
  name: soulsync
  namespace: soulsync
  labels:
    app: soulsync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soulsync
  template:
    metadata:
      labels:
        app: soulsync
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: soulsync
        image: boulderbadgedad/soulsync:2.5.3
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: soulsync-secrets
              key: admin_password
        - name: APP_DOCS_URL
          value: "https://github.com/Nezreka/SoulSync"
        volumeMounts:
        - name: config-data
          mountPath: /config
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: config-data
        persistentVolumeClaim:
          claimName: soulsync-config
      - name: data
        persistentVolumeClaim:
          claimName: soulsync-data
