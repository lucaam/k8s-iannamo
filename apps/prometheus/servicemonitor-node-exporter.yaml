apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-node-exporter
  namespace: prometheus
  labels:
    release: prometheus
    app.kubernetes.io/name: proxmox-node-exporter
spec:
  selector:
    matchLabels:
      app: proxmox-node-exporter
  namespaceSelector:
    matchNames:
      - prometheus
  endpoints:
    - port: metrics
      interval: 30s
