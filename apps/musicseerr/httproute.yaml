apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: musicseerr-httproute
  namespace: musicseerr
  labels:
    app.kubernetes.io/name: musicseerr
spec:
  hostnames:
  - musicseerr.${DOMAIN}
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
    sectionName: websecure
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    # MusicSeerr does not support OIDC — use forward-auth Traefik middleware
    filters:
      - type: ExtensionRef
        extensionRef:
          group: traefik.io
          kind: Middleware
          name: authentik-forward-auth
    backendRefs:
    - name: musicseerr
      port: 8080
