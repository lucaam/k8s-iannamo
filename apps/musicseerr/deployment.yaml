apiVersion: apps/v1
kind: Deployment
metadata:
  name: musicseerr
  namespace: musicseerr
  labels:
    app: musicseerr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: musicseerr
  template:
    metadata:
      labels:
        app: musicseerr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: musicseerr
        image: ghcr.io/habirabbu/musicseerr:1.3.4
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: musicseerr-secrets
              key: admin_password
        - name: APP_DOCS_URL
          value: "https://github.com/HabiRabbu/Musicseerr"
        - name: MUSIC_LIBRARY_PATH
          value: "/media"
        volumeMounts:
        - name: config-data
          mountPath: /config
        - name: media-data
          mountPath: /media
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: config-data
        persistentVolumeClaim:
          claimName: musicseerr-config
      - name: media-data
        persistentVolumeClaim:
          claimName: musicseerr-media
