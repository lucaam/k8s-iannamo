apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-k8s-resources
  namespace: grafana
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana
data:
  k8s-resources-overview.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {},"overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {},
          "targets": [{"expr": "sum by(namespace) (rate(container_cpu_usage_seconds_total{container!~\"POD|\\\"\}[5m]))","refId": "A"}],
          "title": "CPU Usage by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {},"overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 2,
          "options": {},
          "targets": [{"expr": "sum by(namespace) (container_memory_usage_bytes{container!~\"POD|\\\"\})","refId": "A"}],
          "title": "Memory Usage by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {},"overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 3,
          "options": {},
          "targets": [{"expr": "topk(10, sum by(pod, namespace) (rate(container_cpu_usage_seconds_total{container!~\"POD|\\\"\}[5m])))","refId": "A"}],
          "title": "Top 10 Pods by CPU",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {},"overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 4,
          "options": {},
          "targets": [{"expr": "topk(10, sum by(pod, namespace) (container_memory_usage_bytes{container!~\"POD|\\\"\}))","refId": "A"}],
          "title": "Top 10 Pods by Memory",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["k8s","resources"],
      "templating": {"list": []},
      "time": {"from": "now-6h","to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Kubernetes Resources — Overview",
      "uid": "k8s-resources-overview",
      "version": 1
    }
