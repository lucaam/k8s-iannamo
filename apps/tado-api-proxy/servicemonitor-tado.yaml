apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tado-api-proxy
  namespace: tado-proxy
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: tado-api-proxy
  namespaceSelector:
    any: false
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
