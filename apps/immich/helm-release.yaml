apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 5m
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 1m
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    ## This chart relies on the common library chart from bjw-s
    ## You can find it at https://github.com/bjw-s-labs/helm-charts/tree/common-4.3.0/charts/library/common
    ## Refer there for more detail about the supported values

    # These entries are shared between all the Immich components

    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v3.0.3
            env:
              REDIS_HOSTNAME: '{{ printf "%s-valkey" .Release.Name }}'
              IMMICH_MACHINE_LEARNING_URL: '{{ printf "http://%s-machine-learning:3003" .Release.Name }}'
              MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: "ViT-B-32__openai"
              MACHINE_LEARNING_PRELOAD__CLIP__VISUAL: "ViT-B-32__openai"
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: database-immich
                    key: DB_HOSTNAME
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: database-immich
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: database-immich
                    key: DB_PASSWORD
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: database-immich
                    key: DB_DATABASE_NAME
              LOG_LEVEL: verbose
              TZ: Europe/Rome
            resources:
              requests:
                cpu: "10m"
                memory: "1280Mi"
              limits:
                cpu: "50m"
                memory: "2560Mi"
    immich:
      metrics:
        # Enabling this will create the service monitors needed to monitor immich with the prometheus operator
        enabled: true
      persistence:
        # Main data store for all photos shared between different components.
        library:
          # Automatically creating the library volume is not supported by this chart
          # You have to specify an existing PVC to use
          existingClaim: immich-library
      # configuration is immich-config.json converted to yaml
      # ref: https://immich.app/docs/install/config-file/
      #
      configuration: {}

    # Dependencies

    valkey:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: docker.io/valkey/valkey
                tag: 9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
                pullPolicy: IfNotPresent
      persistence:
        data:
          enabled: true
          # Optional: Set this to persistentVolumeClaim to keep job queues persistent
          type: persistentVolumeClaim
          storageClass: nfs-flash
          existingClaim: immich-valkey

    # Immich components

    server:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-server
                tag: v3.0.3
                pullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: "250m"
                  memory: "1280Mi"
                limits:
                  cpu: "1000m"
                  memory: "2560Mi"

    machine-learning:
      enabled: true
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: v3.0.3
                pullPolicy: IfNotPresent
              env:
                TRANSFORMERS_CACHE: /cache
                HF_XET_CACHE: /cache/huggingface-xet
                MPLCONFIGDIR: /cache/matplotlib-config
              resources:
                requests:
                  cpu: "500m"
                  memory: "2048Mi"
                limits:
                  cpu: "2000m"
                  memory: "4096Mi"
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          existingClaim: immich-machine-learning-cache
