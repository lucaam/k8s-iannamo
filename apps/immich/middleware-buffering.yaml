apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: immich-buffering
  namespace: immich
spec:
  buffering:
    maxRequestBodyBytes: 104857600
    maxResponseBodyBytes: 104857600
    memRequestBodyBytes: 1048576
    memResponseBodyBytes: 1048576
    retryExpression: "IsNetworkError()"
